name: Hourly Site Update

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/update_site.py

      - name: Validate schema
        run: bash scripts/validate-schema.sh index.html
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git config user.name "Epic Fury Bot"
          git config user.email "bot@epicfurylive.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Hourly auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
